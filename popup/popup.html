<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Copy Tool</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="2"/>
          <path d="M7 8h4M7 12h10M7 16h7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h1>CSS Copy Tool</h1>
      </div>
      <span class="version">v1.0</span>
    </header>

    <main>
      <button id="toggleBtn" class="btn btn-primary">
        <span class="icon">🎯</span>
        <span class="text">Activate Inspector</span>
      </button>

      <div class="settings">
        <h3>Output Format</h3>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="format" value="css" checked>
            <span class="radio-label">Pure CSS</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="format" value="tailwind">
            <span class="radio-label">Tailwind</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="format" value="inline">
            <span class="radio-label">Inline Styles</span>
          </label>
        </div>
      </div>

      <div class="settings">
        <h3>Properties to Copy</h3>
        <div class="checkbox-group">
          <label class="checkbox-option">
            <input type="checkbox" name="props" value="colors" checked>
            <span>Colors & Backgrounds</span>
          </label>
          <label class="checkbox-option">
            <input type="checkbox" name="props" value="typography" checked>
            <span>Typography</span>
          </label>
          <label class="checkbox-option">
            <input type="checkbox" name="props" value="spacing" checked>
            <span>Spacing (Margin/Padding)</span>
          </label>
          <label class="checkbox-option">
            <input type="checkbox" name="props" value="borders" checked>
            <span>Borders & Radius</span>
          </label>
          <label class="checkbox-option">
            <input type="checkbox" name="props" value="layout" checked>
            <span>Layout (Display/Position)</span>
          </label>
          <label class="checkbox-option">
            <input type="checkbox" name="props" value="effects" checked>
            <span>Effects (Shadow/Opacity)</span>
          </label>
        </div>
      </div>

      <div class="shortcut-info">
        <kbd>Alt</kbd> + <kbd>Shift</kbd> + <kbd>C</kbd>
        <span>Toggle Inspector</span>
      </div>
    </main>

    <footer>
      <span>Made with ❤️</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
